name: Issue Auto Response

on:
  issues:
    types: [opened, labeled]

concurrency:
  group: issue-auto-response-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  auto-response:
    if: |
      !contains(github.event.issue.labels.*.name, 'duplicate') &&
      !contains(github.event.issue.labels.*.name, 'spam') &&
      !contains(github.event.issue.labels.*.name, 'bot-skip')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Check for existing 主神Bot response
        id: check_bot
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "*主神Bot*";
            const allowedLogins = (process.env.ZS_BOT_LOGINS || "github-actions[bot]")
              .split(",")
              .map((value) => value.trim())
              .filter(Boolean);
            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100
              }
            );
            const hasBot = comments.some(
              (comment) => {
                if (!(comment?.body || "").includes(marker)) {
                  return false;
                }
                const user = comment.user;
                if (!user || user.type !== "Bot") {
                  return false;
                }
                return allowedLogins.includes(user.login);
              }
            );
            core.setOutput("has_bot", hasBot ? "true" : "false");
            if (hasBot) {
              core.info("Existing 主神Bot response found; skipping.");
            }
        env:
          ZS_BOT_LOGINS: ${{ vars.ZS_BOT_LOGINS }}

      - name: Checkout repository
        if: steps.check_bot.outputs.has_bot != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Codex home
        if: steps.check_bot.outputs.has_bot != 'true'
        run: mkdir -p "${{ runner.temp }}/codex-home"

      - name: Validate Codex endpoint
        id: validate_endpoint
        if: steps.check_bot.outputs.has_bot != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is required for openai/codex-action@v1" >&2
            exit 1
          fi

          if [ -z "$OPENAI_BASE_URL" ]; then
            echo "OPENAI_BASE_URL is required in this repository and must point to a full Responses API URL like https://example.com/v1/responses" >&2
            exit 1
          fi

          python3 - <<'PY' "$OPENAI_BASE_URL" "$GITHUB_OUTPUT"
          import sys
          from urllib.parse import urlparse

          endpoint = sys.argv[1].strip()
          output_path = sys.argv[2]
          parsed = urlparse(endpoint)

          if parsed.scheme != "https" or not parsed.netloc:
              raise SystemExit("OPENAI_BASE_URL must be an https URL")

          path = parsed.path.rstrip("/")
          if not path.endswith("/responses"):
              raise SystemExit(
                  "OPENAI_BASE_URL must be the full Responses API URL and end with /responses, e.g. https://example.com/v1/responses"
              )

          normalized = parsed._replace(path=path or "/responses").geturl()
          with open(output_path, "a", encoding="utf-8") as fh:
              fh.write(f"responses_api_endpoint={normalized}\n")
              fh.write(f"endpoint_host={parsed.netloc}\n")
              fh.write(f"endpoint_path={path}\n")
              fh.write("endpoint_mode=custom\n")
          print(f"Validated custom Responses endpoint host={parsed.netloc} path={path}")
          PY

      - name: Setup project environment
        if: steps.check_bot.outputs.has_bot != 'true'
        uses: ./.github/actions/setup-project-env

      - name: Run Codex for Issue Auto Response
        if: steps.check_bot.outputs.has_bot != 'true'
        uses: openai/codex-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          responses-api-endpoint: ${{ steps.validate_endpoint.outputs.responses_api_endpoint }}
          codex-home: ${{ runner.temp }}/codex-home
          model: ${{ vars.OPENAI_MODEL || 'gpt-5.4' }}
          effort: ${{ vars.OPENAI_EFFORT || 'high' }}
          sandbox: danger-full-access
          safety-strategy: drop-sudo
          prompt-file: .github/prompts/issue-auto-response.md
          allow-bots: true
          allow-users: "*"

      - name: Diagnose Codex failure
        if: failure() && steps.check_bot.outputs.has_bot != 'true'
        run: |
          echo "workflow=issue-auto-response"
          echo "endpoint_mode=${{ steps.validate_endpoint.outputs.endpoint_mode }}"
          echo "endpoint_host=${{ steps.validate_endpoint.outputs.endpoint_host }}"
          echo "endpoint_path=${{ steps.validate_endpoint.outputs.endpoint_path }}"
          echo "codex_home=${{ runner.temp }}/codex-home"
          echo "model=${{ vars.OPENAI_MODEL || 'gpt-5.4' }}"
          echo "effort=${{ vars.OPENAI_EFFORT || 'high' }}"
