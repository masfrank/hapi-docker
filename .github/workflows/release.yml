name: Release

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write
    id-token: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
            - uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  registry-url: 'https://registry.npmjs.org'
            - run: bun install
            - run: bun run build:single-exe:all
            - name: Prepare npm packages
              run: cd cli && bun run prepare-npm-packages
            - name: Publish npm platform packages
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: |
                  set -euo pipefail
                  echo "${NODE_AUTH_TOKEN}"
                  for platform in darwin-arm64 darwin-x64 linux-arm64 linux-x64 win32-x64; do
                    echo "Publishing @jlovec/hapi-$platform"
                    cd "${GITHUB_WORKSPACE}/cli/npm/$platform"
                    npm publish --access public --provenance --registry=https://registry.npmjs.org
                  done
            - name: Publish npm main package
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: |
                  set -euo pipefail
                  unset NODE_AUTH_TOKEN NPM_TOKEN
                  cd "${GITHUB_WORKSPACE}/cli/npm/main"
                  npm publish --access public --provenance --registry=https://registry.npmjs.org
            - name: Verify npm publish
              run: |
                  npm view @jlovec/hapi version --registry=https://registry.npmjs.org
                  npm view @jlovec/hapi-linux-x64 version --registry=https://registry.npmjs.org
            - name: Package release artifacts
              run: |
                  cd cli/dist-exe
                  mkdir -p ../release-artifacts

                  for dir in bun-*/; do
                      target="${dir%/}"
                      # bun-darwin-arm64 -> hapi-darwin-arm64
                      name="hapi-${target#bun-}"
                      name="${name/windows/win32}"

                      if [[ "$target" == *"windows"* ]]; then
                          zip -j "../release-artifacts/${name}.zip" "$target"/hapi.exe
                      else
                          tar -czvf "../release-artifacts/${name}.tar.gz" -C "$target" hapi
                      fi
                  done

                  cd ../release-artifacts
                  sha256sum * > checksums.txt
            - name: Create Release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release create "${GITHUB_REF#refs/tags/}" \
                      --title "Release ${GITHUB_REF#refs/tags/}" \
                      --generate-notes \
                      cli/release-artifacts/*
            - name: Update Homebrew formula
              continue-on-error: true
              env:
                  GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
              run: |
                  VERSION="${GITHUB_REF#refs/tags/v}"
                  cd cli && bun run update-homebrew-formula --version "$VERSION" --push
