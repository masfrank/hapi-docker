name: Test

on:
    push:
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/actions/setup-project-env
            - run: bun typecheck
            - name: Create integration test env
              run: |
                  {
                      echo "ZS_HOME=~/.zhushen-dev-test"
                      echo "ZS_API_URL=http://localhost:3006"
                      echo "CLI_API_TOKEN=${CLI_API_TOKEN:-dev-test-token}"
                      echo "ZS_DAEMON_HTTP_TIMEOUT=60000"
                      echo "ZS_DAEMON_HEARTBEAT_INTERVAL=30000"
                  } > cli/.env.integration-test
            - run: bun run test
