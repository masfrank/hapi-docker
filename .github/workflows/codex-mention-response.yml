name: Codex Mention Response

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: codex-mention-${{ github.event.comment.id }}
  cancel-in-progress: false

jobs:
  mention-response:
    if: |
      contains(github.event.comment.body, '@tiann') &&
      !endsWith(github.event.comment.user.login, '[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Check user permissions and skip conditions
        id: check_skip
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "*主神Bot*";
            const triggeringCommentId = context.payload.comment.id;
            const replyMarker = `<!-- reply-to:${triggeringCommentId} -->`;
            const allowedLogins = (process.env.ZS_BOT_LOGINS || "github-actions[bot]")
              .split(",").map(v => v.trim()).filter(Boolean);

            // Check user write permission
            const commentAuthor = context.payload.comment.user.login;
            const { data: permissionData } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: commentAuthor
            });
            const permission = permissionData.permission;
            const hasWriteAccess = ["admin", "write"].includes(permission);
            if (!hasWriteAccess) {
              core.setOutput("should_skip", "true");
              core.info(`User ${commentAuthor} has '${permission}' permission; write access required. Skipping.`);
              return;
            }

            // Determine context type
            const isIssueComment = context.eventName === "issue_comment";

            // Get issue/PR number and labels
            let targetNumber, labels, isPR;
            if (isIssueComment) {
              targetNumber = context.payload.issue.number;
              labels = context.payload.issue.labels || [];
              isPR = !!context.payload.issue.pull_request;
            } else {
              targetNumber = context.payload.pull_request.number;
              labels = context.payload.pull_request.labels || [];
              isPR = true;
            }

            // Check for bot-skip label
            const hasBotSkip = labels.some(l => l.name === "bot-skip");
            if (hasBotSkip) {
              core.setOutput("should_skip", "true");
              core.info("bot-skip label found; skipping.");
              return;
            }

            // Check for existing bot reply to this specific comment
            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: targetNumber,
                per_page: 100
              }
            );

            const hasReply = comments.some(comment => {
              const body = comment?.body || "";
              if (!body.includes(marker) || !body.includes(replyMarker)) return false;
              const user = comment.user;
              return user?.type === "Bot" && allowedLogins.includes(user.login);
            });

            if (hasReply) {
              core.setOutput("should_skip", "true");
              core.info(`Existing reply to comment ${triggeringCommentId} found; skipping.`);
              return;
            }

            core.setOutput("should_skip", "false");
            core.setOutput("triggering_comment_id", triggeringCommentId);
            core.setOutput("target_number", targetNumber);
            core.setOutput("event_type", isIssueComment ? "issue_comment" : "pr_review_comment");
            core.setOutput("is_pr", isPR ? "true" : "false");
        env:
          ZS_BOT_LOGINS: ${{ vars.ZS_BOT_LOGINS }}

      - name: Checkout repository
        if: steps.check_skip.outputs.should_skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Fetch all branches
        if: steps.check_skip.outputs.should_skip != 'true'
        run: git fetch --all

      - name: Prepare Codex home
        if: steps.check_skip.outputs.should_skip != 'true'
        run: mkdir -p "${{ runner.temp }}/codex-home"

      - name: Validate Codex endpoint
        id: validate_endpoint
        if: steps.check_skip.outputs.should_skip != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is required for openai/codex-action@v1" >&2
            exit 1
          fi

          if [ -z "$OPENAI_BASE_URL" ]; then
            echo "OPENAI_BASE_URL is required in this repository and must point to a full Responses API URL like https://example.com/v1/responses" >&2
            exit 1
          fi

          python3 - <<'PY' "$OPENAI_BASE_URL" "$GITHUB_OUTPUT"
          import sys
          from urllib.parse import urlparse

          endpoint = sys.argv[1].strip()
          output_path = sys.argv[2]
          parsed = urlparse(endpoint)

          if parsed.scheme != "https" or not parsed.netloc:
              raise SystemExit("OPENAI_BASE_URL must be an https URL")

          path = parsed.path.rstrip("/")
          if not path.endswith("/responses"):
              raise SystemExit(
                  "OPENAI_BASE_URL must be the full Responses API URL and end with /responses, e.g. https://example.com/v1/responses"
              )

          normalized = parsed._replace(path=path or "/responses").geturl()
          with open(output_path, "a", encoding="utf-8") as fh:
              fh.write(f"responses_api_endpoint={normalized}\n")
              fh.write(f"endpoint_host={parsed.netloc}\n")
              fh.write(f"endpoint_path={path}\n")
              fh.write("endpoint_mode=custom\n")
          print(f"Validated custom Responses endpoint host={parsed.netloc} path={path}")
          PY

      - name: Setup project environment
        if: steps.check_skip.outputs.should_skip != 'true'
        uses: ./.github/actions/setup-project-env

      - name: Run Codex for Mention Response
        if: steps.check_skip.outputs.should_skip != 'true'
        uses: openai/codex-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          TRIGGERING_COMMENT_ID: ${{ steps.check_skip.outputs.triggering_comment_id }}
          TARGET_NUMBER: ${{ steps.check_skip.outputs.target_number }}
          EVENT_TYPE: ${{ steps.check_skip.outputs.event_type }}
          IS_PR: ${{ steps.check_skip.outputs.is_pr }}
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          responses-api-endpoint: ${{ steps.validate_endpoint.outputs.responses_api_endpoint }}
          codex-home: ${{ runner.temp }}/codex-home
          model: ${{ vars.OPENAI_MODEL || 'gpt-5.4' }}
          effort: ${{ vars.OPENAI_EFFORT || 'high' }}
          sandbox: danger-full-access
          safety-strategy: drop-sudo
          prompt-file: .github/prompts/codex-mention-response.md
          allow-bots: true

      - name: Diagnose Codex failure
        if: failure() && steps.check_skip.outputs.should_skip != 'true'
        run: |
          echo "workflow=codex-mention-response"
          echo "endpoint_mode=${{ steps.validate_endpoint.outputs.endpoint_mode }}"
          echo "endpoint_host=${{ steps.validate_endpoint.outputs.endpoint_host }}"
          echo "endpoint_path=${{ steps.validate_endpoint.outputs.endpoint_path }}"
          echo "codex_home=${{ runner.temp }}/codex-home"
          echo "model=${{ vars.OPENAI_MODEL || 'gpt-5.4' }}"
          echo "effort=${{ vars.OPENAI_EFFORT || 'high' }}"
