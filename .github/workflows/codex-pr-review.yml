name: Codex PR Review

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]

concurrency:
  group: codex-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-review:
    if: |
      github.event.pull_request.draft == false &&
      !endsWith(github.actor, '[bot]') &&
      !contains(github.event.pull_request.labels.*.name, 'bot-skip')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      review_result: ${{ steps.run_codex.outputs.final-message }}

    steps:
      - name: Check 主神Bot review state
        id: check_bot
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "*主神Bot*";
            const allowedLogins = (process.env.ZS_BOT_LOGINS || "github-actions[bot]")
              .split(",")
              .map((value) => value.trim())
              .filter(Boolean);
            const currentHeadSha = context.payload.pull_request.head.sha;
            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100
              }
            );
            const botReviews = reviews
              .filter((review) => {
                if (!(review?.body || "").includes(marker)) {
                  return false;
                }
                const user = review.user;
                if (!user || user.type !== "Bot") {
                  return false;
                }
                return allowedLogins.includes(user.login);
              })
              .sort((left, right) => {
                const leftTime = new Date(left.submitted_at || left.created_at || 0).getTime();
                const rightTime = new Date(right.submitted_at || right.created_at || 0).getTime();
                if (rightTime !== leftTime) {
                  return rightTime - leftTime;
                }
                return (right.id || 0) - (left.id || 0);
              });
            const latestBotReview = botReviews[0];
            const hasReviewForCurrentHead = botReviews.some(
              (review) => review.commit_id === currentHeadSha
            );
            const isFollowUpReview = Boolean(
              latestBotReview?.commit_id && latestBotReview.commit_id !== currentHeadSha
            );

            core.setOutput("current_head_sha", currentHeadSha);
            core.setOutput("has_review_for_current_head", hasReviewForCurrentHead ? "true" : "false");
            core.setOutput("latest_bot_review_id", latestBotReview ? String(latestBotReview.id) : "");
            core.setOutput("latest_bot_review_commit", latestBotReview?.commit_id || "");
            core.setOutput("is_follow_up_review", isFollowUpReview ? "true" : "false");

            if (hasReviewForCurrentHead) {
              core.info(`Existing 主神Bot review found for ${currentHeadSha}; skipping.`);
            } else if (isFollowUpReview) {
              core.info(
                `Latest 主神Bot review was for ${latestBotReview.commit_id}; running follow-up review for ${currentHeadSha}.`
              );
            }
        env:
          ZS_BOT_LOGINS: ${{ vars.ZS_BOT_LOGINS }}

      - name: Checkout repository
        if: steps.check_bot.outputs.has_review_for_current_head != 'true'
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0

      - name: Pre-fetch base and head refs
        if: steps.check_bot.outputs.has_review_for_current_head != 'true'
        run: |
          git fetch --no-tags origin \
            ${{ github.event.pull_request.base.ref }} \
            +refs/pull/${{ github.event.pull_request.number }}/head

      - name: Prepare Codex home
        if: steps.check_bot.outputs.has_review_for_current_head != 'true'
        run: mkdir -p "${{ runner.temp }}/codex-home"

      - name: Validate Codex endpoint
        id: validate_endpoint
        if: steps.check_bot.outputs.has_review_for_current_head != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is required for openai/codex-action@v1" >&2
            exit 1
          fi

          if [ -z "$OPENAI_BASE_URL" ]; then
            echo "OPENAI_BASE_URL is required in this repository and must point to a full Responses API URL like https://example.com/v1/responses" >&2
            exit 1
          fi

          python3 - <<'PY' "$OPENAI_BASE_URL" "$GITHUB_OUTPUT"
          import sys
          from urllib.parse import urlparse

          endpoint = sys.argv[1].strip()
          output_path = sys.argv[2]
          parsed = urlparse(endpoint)

          if parsed.scheme != "https" or not parsed.netloc:
              raise SystemExit("OPENAI_BASE_URL must be an https URL")

          path = parsed.path.rstrip("/")
          if not path.endswith("/responses"):
              raise SystemExit(
                  "OPENAI_BASE_URL must be the full Responses API URL and end with /responses, e.g. https://example.com/v1/responses"
              )

          normalized = parsed._replace(path=path or "/responses").geturl()
          with open(output_path, "a", encoding="utf-8") as fh:
              fh.write(f"responses_api_endpoint={normalized}\n")
              fh.write(f"endpoint_host={parsed.netloc}\n")
              fh.write(f"endpoint_path={path}\n")
              fh.write("endpoint_mode=custom\n")
          print(f"Validated custom Responses endpoint host={parsed.netloc} path={path}")
          PY

      - name: Setup project environment
        uses: ./.github/actions/setup-project-env

      - name: Run Codex for PR Review
        id: run_codex
        if: steps.check_bot.outputs.has_review_for_current_head != 'true'
        uses: openai/codex-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          CURRENT_HEAD_SHA: ${{ steps.check_bot.outputs.current_head_sha }}
          LATEST_BOT_REVIEW_ID: ${{ steps.check_bot.outputs.latest_bot_review_id }}
          LATEST_BOT_REVIEW_COMMIT: ${{ steps.check_bot.outputs.latest_bot_review_commit }}
          IS_FOLLOW_UP_REVIEW: ${{ steps.check_bot.outputs.is_follow_up_review }}
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          responses-api-endpoint: ${{ steps.validate_endpoint.outputs.responses_api_endpoint }}
          codex-home: ${{ runner.temp }}/codex-home
          model: ${{ vars.OPENAI_MODEL || 'gpt-5.2-codex' }}
          effort: ${{ vars.OPENAI_EFFORT || 'high' }}
          sandbox: danger-full-access
          safety-strategy: drop-sudo
          prompt-file: .github/prompts/codex-pr-review.md
          allow-bots: true
          allow-users: "*"

      - name: Diagnose Codex failure
        if: failure() && steps.check_bot.outputs.has_review_for_current_head != 'true'
        run: |
          echo "workflow=codex-pr-review"
          echo "endpoint_mode=${{ steps.validate_endpoint.outputs.endpoint_mode }}"
          echo "endpoint_host=${{ steps.validate_endpoint.outputs.endpoint_host }}"
          echo "endpoint_path=${{ steps.validate_endpoint.outputs.endpoint_path }}"
          echo "codex_home=${{ runner.temp }}/codex-home"
          echo "model=${{ vars.OPENAI_MODEL || 'gpt-5.2-codex' }}"
          echo "effort=${{ vars.OPENAI_EFFORT || 'high' }}"
