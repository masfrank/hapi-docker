name: Docker Images

on:
  pull_request:
    paths:
      - 'Dockerfile.*'
      - 'docker-compose.yml'
      - '.dockerignore'
      - '.env.example'
      - '.github/workflows/docker-images.yml'
      - 'package.json'
      - 'bun.lock'
      - 'cli/**'
      - 'hub/**'
      - 'shared/**'
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'Dockerfile.*'
      - 'docker-compose.yml'
      - '.dockerignore'
      - '.env.example'
      - '.github/workflows/docker-images.yml'
      - 'package.json'
      - 'bun.lock'
      - 'cli/**'
      - 'hub/**'
      - 'shared/**'

permissions:
  contents: read

jobs:
  pr-validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: hub
            dockerfile: Dockerfile.hub
          - name: runner
            dockerfile: Dockerfile.runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup project environment
        uses: ./.github/actions/setup-project-env
        with:
          install-dependencies: 'false'

      - name: Lockfile precheck (frozen)
        run: |
          bun install --frozen-lockfile
          git diff --exit-code bun.lock

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker build (${{ matrix.name }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false

  compose-smoke:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      COMPOSE_PROJECT_NAME: zs-smoke
      ZS_HUB_IMAGE: zs-hub:candidate
      ZS_RUNNER_IMAGE: zs-runner:candidate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup project environment
        uses: ./.github/actions/setup-project-env
        with:
          install-dependencies: 'false'

      - name: Lockfile precheck (frozen)
        run: |
          bun install --frozen-lockfile
          git diff --exit-code bun.lock

      - name: Build hub candidate image
        run: docker build -f Dockerfile.hub -t "$ZS_HUB_IMAGE" .

      - name: Build runner candidate image
        run: docker build -f Dockerfile.runner -t "$ZS_RUNNER_IMAGE" .

      - name: Runner smoke test
        run: |
          docker run --rm "$ZS_RUNNER_IMAGE" zs --help
          docker run --rm "$ZS_RUNNER_IMAGE" bun --version

      - name: Create smoke env
        run: |
          mkdir -p /tmp/.claude-smoke
          cat > .env <<EOF
          CLI_API_TOKEN=smoke-test-token
          ZS_API_URL=http://zs-hub:3006
          CLAUDE_CONFIG_DIR=/tmp/.claude-smoke
          EOF

      - name: Validate env
        run: bun run docker:check

      - name: Compose smoke test
        run: |
          docker compose up -d zs-hub zs-runner
          sleep 5
          docker compose ps
          docker compose logs zs-hub zs-runner

      - name: Teardown compose stack
        if: always()
        run: docker compose down -v

  publish-runner:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: compose-smoke
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup project environment
        uses: ./.github/actions/setup-project-env
        with:
          install-dependencies: 'false'

      - name: Lockfile precheck (frozen)
        run: |
          bun install --frozen-lockfile
          git diff --exit-code bun.lock

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/zs-runner
          tags: |
            type=sha,prefix=
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build and push runner
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.runner
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-hub:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: compose-smoke
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup project environment
        uses: ./.github/actions/setup-project-env
        with:
          install-dependencies: 'false'

      - name: Lockfile precheck (frozen)
        run: |
          bun install --frozen-lockfile
          git diff --exit-code bun.lock

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/zs-hub
          tags: |
            type=sha,prefix=
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build and push hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.hub
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
